<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="Personal site of Leedow, a full-stack developer and founder of ChainsBrain.">
    <meta name="theme-color" content="#080808">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Leedow — Full-stack developer &amp; ChainsBrain founder">
    <meta property="og:description" content="Personal site of Leedow, a full-stack developer and founder of ChainsBrain.">
    <meta property="og:url" content="https://www.leedow.com/">

    <link rel="canonical" href="https://www.leedow.com/">
    <title>Leedow — Full-stack developer &amp; ChainsBrain founder</title>

    <style>
      :root {
        color-scheme: dark;
        --background: #080808;
        --foreground: #f2f1ec;
        --muted: #92928d;
        --line: rgba(242, 241, 236, 0.38);
        --accent-a: #d8646f;
        --accent-b: #7079d9;
        --page-space: clamp(1.5rem, 5vw, 4.5rem);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--background);
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input {
        font: inherit;
      }

      a {
        color: inherit;
      }

      .page {
        position: relative;
        isolation: isolate;
        display: grid;
        grid-template-rows: auto minmax(min-content, 1fr) auto;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        padding: calc(var(--page-space) + env(safe-area-inset-top))
          calc(var(--page-space) + env(safe-area-inset-right))
          calc(var(--page-space) + env(safe-area-inset-bottom))
          calc(var(--page-space) + env(safe-area-inset-left));
      }

      .topbar,
      .footer {
        position: relative;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand,
      .nav-link {
        display: inline-flex;
        align-items: center;
        min-height: 2.75rem;
        color: var(--foreground);
        font-size: 0.78rem;
        font-weight: 650;
        letter-spacing: 0.16em;
        text-decoration: none;
        text-transform: uppercase;
      }

      .brand {
        gap: 0.65rem;
      }

      .brand::before {
        flex: 0 0 auto;
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 50%;
        content: "";
        background: var(--accent-a);
      }

      .topnav {
        display: flex;
        align-items: center;
        gap: clamp(1rem, 2vw, 1.75rem);
      }

      .nav-link {
        position: relative;
        gap: 0.45rem;
      }

      .nav-link::after {
        position: absolute;
        right: 0;
        bottom: 0.45rem;
        left: 0;
        height: 1px;
        content: "";
        background: currentColor;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 240ms ease;
      }

      .nav-link:hover::after,
      .nav-link:focus-visible::after {
        transform: scaleX(1);
        transform-origin: left;
      }

      main {
        position: relative;
        display: grid;
        align-items: center;
        min-height: 0;
      }

      .hero {
        position: relative;
        z-index: 2;
        width: min(70rem, 76%);
        padding-block: clamp(1.5rem, 5vh, 4.5rem);
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin: 0 0 clamp(1.25rem, 3vh, 2.5rem);
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 650;
        letter-spacing: 0.2em;
        line-height: 1.5;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 2.25rem;
        height: 1px;
        content: "";
        background: var(--muted);
      }

      h1 {
        max-width: 9ch;
        margin: 0;
        color: var(--foreground);
        font-size: clamp(4.5rem, 9vw, 9rem);
        font-weight: 560;
        letter-spacing: -0.065em;
        line-height: 0.87;
      }

      .name {
        white-space: nowrap;
      }

      .dot {
        display: inline-block;
        color: var(--accent-a);
        background: linear-gradient(135deg, var(--accent-a) 15%, var(--accent-b) 85%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .intro-form {
        width: min(24rem, 100%);
        margin-top: clamp(2.25rem, 6vh, 4.75rem);
      }

      .intro-form label {
        display: block;
        margin-bottom: 0.45rem;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
      }

      .field {
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--line);
        transition: border-color 180ms ease;
      }

      .field:focus-within {
        border-color: rgba(242, 241, 236, 0.78);
      }

      .field input {
        width: 100%;
        min-width: 0;
        padding: 0.7rem 0;
        border: 0;
        background: transparent;
        color: var(--foreground);
        font-size: 0.9rem;
      }

      .field input::placeholder {
        color: var(--muted);
        opacity: 1;
      }

      .field input:focus-visible {
        border-radius: 0.125rem;
        outline: 2px solid var(--foreground);
        outline-offset: 0.2rem;
      }

      .field button {
        display: grid;
        flex: 0 0 2.75rem;
        width: 2.75rem;
        height: 2.75rem;
        padding: 0;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: var(--foreground);
        cursor: pointer;
        place-items: center;
        transition: background-color 180ms ease, transform 180ms ease;
      }

      .field button:hover {
        background: rgba(242, 241, 236, 0.08);
      }

      .brand:focus-visible,
      .nav-link:focus-visible,
      .field button:focus-visible {
        outline: 2px solid var(--foreground);
        outline-offset: 0.25rem;
      }

      .response {
        min-height: 1.1rem;
        margin: 0.6rem 0 0;
        color: var(--muted);
        font-size: 0.8rem;
        overflow-wrap: anywhere;
      }

      .portrait {
        position: absolute;
        z-index: 1;
        right: calc(0px - var(--page-space) - env(safe-area-inset-right));
        bottom: calc(0px - var(--page-space) - env(safe-area-inset-bottom) - 1rem);
        width: min(38vw, 30rem);
        margin: 0;
        pointer-events: none;
        opacity: 0.76;
        -webkit-mask-image: linear-gradient(135deg, transparent 2%, #000 48%);
        mask-image: linear-gradient(135deg, transparent 2%, #000 48%);
      }

      .portrait img {
        display: block;
        width: 100%;
        height: auto;
        filter: grayscale(1) contrast(1.08);
      }

      .footer {
        justify-content: flex-end;
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .footer p {
        margin: 0;
      }

      @media (max-width: 56rem) {
        .hero {
          width: 100%;
        }

        .portrait {
          width: min(64vw, 30rem);
          opacity: 0.5;
        }
      }

      @media (max-width: 40rem) {
        :root {
          --page-space: clamp(1.25rem, 6vw, 2rem);
        }

        h1 {
          font-size: clamp(3.6rem, 18vw, 5.5rem);
        }

        .hero {
          padding-block: clamp(1.25rem, 4vh, 2.5rem);
        }

        .topnav {
          gap: 0.75rem;
        }

        .nav-link {
          font-size: 0.7rem;
          letter-spacing: 0.08em;
        }

        .portrait {
          width: min(100vw, 30rem);
          opacity: 0.42;
          -webkit-mask-image: linear-gradient(145deg, transparent 8%, #000 62%);
          mask-image: linear-gradient(145deg, transparent 8%, #000 62%);
        }

      }

      @media (max-height: 40rem) {
        :root {
          --page-space: clamp(1rem, 4vh, 1.5rem);
        }

        .hero {
          padding-block: 0.75rem;
        }

        .eyebrow {
          margin-bottom: 0.9rem;
        }

        h1 {
          font-size: clamp(3.2rem, 15vh, 5.4rem);
        }

        .intro-form {
          margin-top: 1.4rem;
        }

        .field input {
          padding-block: 0.45rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation: none !important;
          transition-duration: 0.01ms !important;
        }
      }

      @media (forced-colors: active) {
        .dot {
          -webkit-text-fill-color: currentColor;
        }

        .portrait {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Leedow, home">
          Leedow
        </a>

        <nav class="topnav" aria-label="External links">
          <a class="nav-link" href="https://github.com/leedow" target="_blank" rel="me noreferrer">
            GitHub <span aria-hidden="true">↗</span>
          </a>
          <a class="nav-link" href="https://www.chainsbrain.com/" target="_blank" rel="noopener noreferrer">
            ChainsBrain <span aria-hidden="true">↗</span>
          </a>
        </nav>
      </header>

      <main>
        <section class="hero" aria-labelledby="hero-title">
          <p class="eyebrow"><span>Full-stack developer · Founder of ChainsBrain</span></p>
          <h1 id="hero-title">Hi, I’m<br><span class="name">Leedow<span class="dot">.</span></span></h1>

          <form class="intro-form" id="intro-form" action="./#intro-response">
            <label for="visitor-name">What’s your name?</label>
            <div class="field">
              <input
                id="visitor-name"
                type="text"
                maxlength="48"
                autocomplete="name"
                placeholder="Type your name"
                aria-describedby="intro-response"
              >
              <button type="submit" aria-label="Introduce yourself"><span aria-hidden="true">↗</span></button>
            </div>
            <p class="response" id="intro-response" role="status" aria-live="polite"></p>
          </form>
        </section>

        <figure class="portrait" aria-hidden="true">
          <img src="./v.jpeg" alt="" width="480" height="300">
        </figure>
      </main>

      <footer class="footer">
        <p>© <span id="year">2026</span> Leedow</p>
      </footer>
    </div>

    <script>
      const form = document.querySelector('#intro-form');
      const input = document.querySelector('#visitor-name');
      const response = document.querySelector('#intro-response');

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const name = input.value.trim().replace(/\s+/g, ' ');

        if (!name) {
          response.textContent = 'I’d love to know.';
          input.focus();
          return;
        }

        response.textContent = `Nice to meet you, ${name}.`;
      });

      document.querySelector('#year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
